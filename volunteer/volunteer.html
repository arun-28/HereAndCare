<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration - Here and Care</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>

    <script>

        function validateForm() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;

            // Full Name Length Check
            if (name.length < 3 || name.length > 15) {
                alert("Full Name must be between 3 and 15 characters.");
                document.getElementById("name").focus();
                return false;
            }

            // Email Validation
            let emailPattern = /^[A-Za-z0-9]{5,20}@gmail\.com$/;

            if (!emailPattern.test(email)) {
                alert("Enter valid Gmail address.");
                document.getElementById("email").focus();
                return false;
            }

            // Phone Validation
            if (phone.length != 10) {
                alert("Phone number must contain exactly 10 digits.");
                document.getElementById("phone").focus();
                return false;
            }

            alert("Form submitted successfully! Thank You for Your Contribution");

            return true;
        }

    </script>

</head>

<body>

    <div class="container">

        <h1>Join Us as a Volunteer</h1>

        <p>
            We appreciate your interest in joining Here and Care.
            Please fill out the form below to become a part of our volunteer team.
        </p>

        <form onsubmit="return validateForm()">

            <!-- Full Name -->
            <div class="form-group">
                <label for="name">Full Name</label>

                <input type="text"
                    id="name"
                    name="name"
                    placeholder="Your Full Name"
                    maxlength="15"
                    minlength="3"

                    oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"

                    required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>

                <input type="text"
                    id="email"
                    name="email"
                    placeholder="example@gmail.com"

                    pattern="[A-Za-z0-9]{5,20}@gmail\.com"

                    required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone Number</label>

                <input type="text"
                    id="phone"
                    name="phone"
                    placeholder="10 Digit Number"
                    maxlength="10"

                    oninput="this.value=this.value.replace(/[^0-9]/g,'')"

                    required>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label for="address">Address</label>

                <input type="text"
                    id="address"
                    name="address"
                    placeholder="Your Address"

                    oninput="this.value=this.value.replace(/[^A-Za-z0-9\/ ]/g,'')"

                    required>
            </div>

            <!-- Availability -->
            <div class="form-group">
                <label for="availability">Availability</label>

                <input type="text"
                    id="availability"
                    name="availability"
                    placeholder="Available Days"

                    oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"

                    required>
            </div>

            <!-- Skills -->
            <div class="form-group">
                <label for="skills">Skills and Interests</label>

                <textarea
                    id="skills"
                    name="skills"
                    rows="4"
                    placeholder="Your Skills"

                    oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"

                    required></textarea>
            </div>

            <!-- Button -->
            <div class="form-group">
                <button type="submit">Submit Registration</button>
            </div>

        </form>

    </div>

</body>

</html>
